<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Quizlet Yönetim Paneli{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { min-height: calc(100vh - 56px); background-color: #1e1e2d; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        .sidebar a { color: #9899ac; text-decoration: none; padding: 14px 20px; display: block; font-weight: 500; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background-color: #2b2b40; color: #ffffff; border-left: 4px solid #6610f2; }
        .sidebar i { margin-right: 10px; font-size: 1.1rem; }
        .main-content { padding: 30px; }
        .navbar-brand { font-weight: 700; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand navbar-dark bg-dark px-4 py-2 shadow-sm">
        <a class="navbar-brand text-light" href="#"><i class="bi bi-lightning-charge-fill text-warning me-2"></i>QUIZLET ADMIN</a>
        <div class="ms-auto d-flex align-items-center">
            <span class="text-secondary me-3"><i class="bi bi-person-circle me-1"></i> Yönetici Modu</span>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
          
            <div class="col-md-2 p-0 sidebar d-none d-md-block">
                <div class="py-2">
                    <a href="#" class="active"><i class="bi bi-grid-1x2-fill"></i> Ana Sayfa</a>
                    <a href="#"><i class="bi bi-collection-fill"></i> Kelime Listelerim</a>
                    <a href="#"><i class="bi bi-plus-square-dotted"></i> Yeni Liste Ekle</a>
                    <a href="#"><i class="bi bi-people-fill"></i> Kullanıcılar</a>
                    <a href="#"><i class="bi bi-gear-fill"></i> Roller & Ayarlar</a>
                </div>
            </div>

            <div class="col-md-10 main-content">
                {% block content %}
                {% endblock %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
