{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Quizlet Uygulamam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <div class="container mt-5">
        <h1 class="text-center mb-5">Benim Kelime Listelerim</h1>
        
        <div class="row">
            {% for liste in listeler %}
            <div class="col-md-4">
                
                <div class="card shadow-sm mb-4">
                    <div class="card-body text-center p-4">
                        <h4 class="card-title mb-3">{{ liste.name }}</h4>
                        <a href="{% url 'liste_detay' liste.id %}" class="btn btn-primary w-100">Çalışmaya Başla</a>
                    </div>
                </div>

            </div>
            {% empty %}
            <p class="text-center">Henüz hiç liste oluşturmadın.</p>
            {% endfor %}
        </div>
    </div>

</body>
</html>
